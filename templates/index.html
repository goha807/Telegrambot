<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Music Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f0f23;
            --bg-card: #1a1a2e;
            --bg-input: #252542;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --success: #10b981;
            --error: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
        }
        
        /* Login */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-card h1 { margin-bottom: 10px; }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; }
        
        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card .icon { font-size: 30px; margin-bottom: 15px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .stat-card .label { color: var(--text-muted); font-size: 14px; }
        
        /* Download Section */
        .download-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .download-section h2 { margin-bottom: 20px; }
        
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .download-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Shop */
        .shop-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .shop-item {
            background: var(--bg-input);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .shop-item .name { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .shop-item .price { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        .shop-item .btn { width: 100%; }
        
        /* Promo */
        .promo-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .promo-form { display: flex; gap: 15px; margin-top: 15px; }
        .promo-form input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
        }
        
        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .notification.show { transform: translateX(0); }
        .notification.success { background: var(--success); color: white; }
        .notification.error { background: var(--error); color: white; }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            .promo-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">🎵 Music Downloader</div>
            <div id="userInfo"></div>
        </header>

        {% if not logged_in %}
        <div class="login-container">
            <div class="login-card">
                <h1>🎵 Ласкаво просимо!</h1>
                <p>Завантажуй музику та відео з YouTube</p>
                <div id="telegram-login"></div>
            </div>
        </div>
        {% else %}
        <div class="dashboard active">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">⭐</div>
                    <div class="value" id="starsValue">-</div>
                    <div class="label">Зірки</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📥</div>
                    <div class="value" id="downloadsValue">-</div>
                    <div class="label">Завантажень</div>
                </div>
                <div class="stat-card">
                    <div class="icon">🎵</div>
                    <div class="value" id="tracksValue">-</div>
                    <div class="label">Треків</div>
                </div>
            </div>

            <!-- Download -->
            <div class="download-section">
                <h2>📥 Завантажити</h2>
                <form id="downloadForm">
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label>Назва або посилання</label>
                            <input type="text" name="query" placeholder="Наприклад: Imagine Dragons - Believer" required>
                        </div>
                        <div class="form-group">
                            <label>Тип</label>
                            <select name="type">
                                <option value="audio">🎵 Аудіо</option>
                                <option value="video">🎬 Відео</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Якість</label>
                            <select name="quality">
                                <option value="128">128 kbps</option>
                                <option value="192" selected>192 kbps</option>
                                <option value="256">256 kbps</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="download-btn" id="downloadBtn">
                        Завантажити
                    </button>
                </form>
            </div>

            <!-- Shop -->
            <div class="shop-section">
                <h2>🛒 Магазин</h2>
                <div class="shop-grid">
                    <div class="shop-item">
                        <div class="name">👑 VIP 1 день</div>
                        <div class="price">200 ⭐</div>
                        <button class="btn btn-primary" onclick="buyItem('vip_1_day')">Купити</button>
                    </div>
                    <div class="shop-item">
                        <div class="name">👑 VIP 7 днів</div>
                        <div class="price">1000 ⭐</div>
                        <button class="btn btn-primary" onclick="buyItem('vip_7_days')">Купити</button>
                    </div>
                    <div class="shop-item">
                        <div class="name">♾ Безліміт 24г</div>
                        <div class="price">500 ⭐</div>
                        <button class="btn btn-primary" onclick="buyItem('unlimited_24h')">Купити</button>
                    </div>
                </div>
            </div>

            <!-- Promo -->
            <div class="promo-section">
                <h2>🎁 Промокод</h2>
                <form class="promo-form" id="promoForm">
                    <input type="text" name="code" placeholder="Введіть промокод" required>
                    <button type="submit" class="btn btn-primary">Активувати</button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>

    <div class="notification" id="notification"></div>

    {% if not logged_in %}
    <script src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="YourBotUsername" 
            data-size="large" 
            data-auth-url="/auth" 
            data-request-access="write"></script>
    {% endif %}

    <script>
        {% if logged_in %}
        document.getElementById('userInfo').innerHTML = `
            <span>👤 {{ user.first_name }}</span>
            <button class="btn btn-secondary" onclick="logout()">Вийти</button>
        `;
        updateStats();
        {% endif %}

        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = 'notification ' + type + ' show';
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        {% if logged_in %}
        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('starsValue').textContent = data.stars;
                document.getElementById('downloadsValue').textContent = data.downloads;
                document.getElementById('tracksValue').textContent = data.tracks;
            } catch(e) { console.error(e); }
        }

        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Завантаження...';
            
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/api/download', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('✅ Готово! Починається завантаження...', 'success');
                    window.location.href = data.download_url;
                    updateStats();
                } else {
                    showNotification('❌ ' + data.error, 'error');
                }
            } catch(e) {
                showNotification('❌ Помилка з\'єднання', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = 'Завантажити';
        });

        async function buyItem(item) {
            const formData = new FormData();
            formData.append('item', item);
            
            try {
                const res = await fetch('/api/shop/buy', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('✅ ' + data.message, 'success');
                    updateStats();
                } else {
                    showNotification('❌ ' + data.error, 'error');
                }
            } catch(e) {
                showNotification('❌ Помилка', 'error');
            }
        }

        document.getElementById('promoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const res = await fetch('/api/promo', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    showNotification('✅ ' + data.message, 'success');
                    updateStats();
                } else {
                    showNotification('❌ ' + data.error, 'error');
                }
            } catch(e) {
                showNotification('❌ Помилка', 'error');
            }
            e.target.reset();
        });

        async function logout() {
            await fetch('/logout');
            location.reload();
        }

        setInterval(updateStats, 30000);
        {% endif %}
    </script>
</body>
</html>
